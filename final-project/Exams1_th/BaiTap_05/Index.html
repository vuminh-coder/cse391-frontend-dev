<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý nhân viên</title>
    <link rel="stylesheet" href="assets/Styles.css" />
  </head>
  <body>
    <header class="d-flex justify-content-between align-items-center">
      <ul class="d-flex list-style-type-none padding-left-0 gap-x-3">
        <li>
          <a href="index.html" class="item text-decoration-none">Trang chủ</a>
        </li>
        <li>
          <a href="about.html" class="item text-decoration-none">Giới thiệu</a>
        </li>
      </ul>
      <form class="d-flex gap-x-3">
        <input type="search" placeholder="Tìm kiếm..." />
        <button type="submit">Tìm</button>
      </form>
    </header>

    <main>
      <div class="Employee d-flex justify-content-between align-items-center">
        <h2 class="Employee-text">Quản lý nhân viên</h2>
        <button class="Employee-btn" id="addEmployeeBtn">Thêm mới</button>
      </div>

      <table>
        <thead>
          <tr>
            <th><input type="checkbox" /></th>
            <th>Nhân viên</th>
            <th class="Email">Email</th>
            <th>Chức vụ</th>
            <th>Phòng ban</th>
            <th class="Action">Hành động</th>
          </tr>
        </thead>
        <tbody>
          <!-- Dữ liệu nhân viên mẫu -->
          <tr>
            <td><input type="checkbox" /></td>
            <td>Vũ Văn Minh</td>
            <td>minhvv@example.com</td>
            <td>Frontend Developer</td>
            <td>Công nghệ thông tin</td>
            <td>
              <button class="EditDelete-btn bg-orange">Sửa</button>
              <button class="EditDelete-btn bg-red">Xóa</button>
            </td>
          </tr>
          <tr>
            <td><input type="checkbox" /></td>
            <td>Nguyễn Thị B</td>
            <td>bnt@example.com</td>
            <td>Backend Developer</td>
            <td>Công nghệ thông tin</td>
            <td>
              <button class="EditDelete-btn bg-orange">Sửa</button>
              <button class="EditDelete-btn bg-red">Xóa</button>
            </td>
          </tr>
        </tbody>
      </table>
    </main>

    <!-- Form thêm nhân viên mới (modal) -->
    <div class="newEmployee" id="newEmployeeForm">
      <div class="d-flex justify-content-between">
        <h3>Thêm mới nhân viên</h3>
        <button id="closeFormBtn">X</button>
      </div>
      <form class="padding-lr-5">
        <div class="d-flex">
          <div class="flex-fill mb-3">
            <label for="fullName">Họ và tên</label><br />
            <input type="text" id="fullName" placeholder="Vũ Văn Minh" />
          </div>
          <div class="flex-fill mb-3">
            <label for="email">Email</label><br />
            <input type="email" id="email" placeholder="minhvv@tlu.edu.vn" />
          </div>
        </div>
        <div class="d-flex">
          <div class="flex-fill mb-3">
            <label for="position">Chức vụ</label><br />
            <select id="position">
              <option value="">Chọn chức vụ</option>
              <option value="dev">Developer</option>
              <option value="tester">Tester</option>
            </select>
          </div>
          <div class="flex-fill mb-3">
            <label for="department">Phòng ban</label><br />
            <select id="department">
              <option value="">Chọn phòng ban</option>
              <option value="cntt">Công nghệ thông tin</option>
              <option value="mkt">Marketing</option>
            </select>
          </div>
        </div>
        <div class="d-flex justify-content-end Sc">
          <button type="button" class="Sc-btn bg-darkgray">Hủy</button>
          <button type="submit" class="Sc-btn bg-green">Lưu</button>
        </div>
      </form>
    </div>

    <script src="assets/main.js"></script>
  </body>
</html>
