<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      rel="stylesheet"
      href="./bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="./bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/js/bootstrap.bundle.js"
    />
    <link rel="stylesheet" href="./bootstrap-5.3.8-dist/assets/index.css" />
  </head>
  <body>
    <div class="container-fluid">
      <div class="container">
        <form
          id="form"
          class="w-100 h-100 d-flex flex-column justify-content-center align-items-center"
        >
          <div class="d-flex flex-column w-100">
            <label for="name">Name</label
            ><input
              type="text"
              id="name"
              placeholder="Input your name"
              class="form-input px-3 mt-1"
            />
          </div>

          <div class="d-flex w-100 justify-content-between align-items-center">
            <div class="d-flex flex-column w-75">
              <label for="score">Score</label
              ><input
                type="number"
                id="score"
                placeholder="Input your Score"
                class="form-input px-3 mt-1"
              />
            </div>

            <button
              type="submit"
              class="btn bg-success text-white w-5 d-flex align-items-center text-center mt-2"
            >
              Thêm
            </button>
          </div>
        </form>

        <table
          class="w-100 mt-5 table table-bordered table-white text-white border-black"
          border="2"
        >
          <thead>
            <tr>
              <th>Stt</th>
              <th>Họ tên</th>
              <th id="ttScore">Điểm</th>
              <th>Xếp loại</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </body>
  <script src="Js.js"></script>
</html>
