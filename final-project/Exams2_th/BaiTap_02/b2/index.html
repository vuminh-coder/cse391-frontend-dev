<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Oleo+Script:wght@700&family=Quicksand:wght@300;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./assets/shared.css" />
    <link rel="stylesheet" href="./assets/styles.css" />
    <title>Travel Goals</title>
  </head>
  <body>
    <div class="img d-block w-100">
      <img src="./assets/img/ocean.jpg" alt="" height="270px" class="w-100" />
    </div>
    <header class="z-999">
      <div id="page-logo" class="z-999">
        <a href="#">Travel Goals</a>
      </div>
      <nav class="z-999">
        <ul>
          <li><a class="" href="/places.html">Destinations</a></li>
          <li><a class="" href="">About</a></li>
        </ul>
      </nav>
    </header>
    <main class="z-999">
      <section id="hero">
        <div id="hero-content" class="z-999">
          <h1>Joe's Travel Page</h1>
          <p>Let's explore the world together!</p>
          <a href="/places.html">Discover places</a>
        </div>
      </section>
      <section id="highlights">
        <h2>Highlights</h2>
        <ul id="destinations">
          <li class="destination">
            <img
              src="./assets/img/cities/miami.jpg"
              alt="Miami streets on sunny day"
              width="calc(100vw / 3)"
            />
            <p>Miami <strong>USA</strong></p>
          </li>
          <li class="destination">
            <img
              src="./assets/img/cities/munich.jpg"
              alt="Munich stadium in winter"
              width="calc(100vw / 3)"
            />
            <p>Munich <strong>Germany</strong></p>
          </li>
          <li class="destination">
            <img
              src="./assets/img/cities/barcelona.jpg"
              alt="Palm beach in Barcelona"
              width="calc(100vw / 3)"
            />
            <p>Barcelona <strong>Spain</strong></p>
          </li>
        </ul>
      </section>
    </main>

    <footer class="z-999">
      <ul>
        <li>
          <a href="https://www.instagram.com">
            <img src="./assets/icons/insta.png" alt="Instagram logo"
          /></a>
        </li>
        <li>
          <a href="https://www.facebook.com">
            <img src="./assets/icons/facebook.png" alt="Facebook logo"
          /></a>
        </li>
      </ul>
    </footer>
  </body>
</html>
