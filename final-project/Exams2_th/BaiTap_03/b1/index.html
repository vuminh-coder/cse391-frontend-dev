<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <form action="">
      <h4 class="text-center">
        Get in touch with us by filling contact form below
      </h4>
      <div
        class="d-flex justify-between align-center w-100vw gap-x-4 mg-top-20"
      >
        <input
          type="text"
          placeholder="* Enter your full name"
          class="h-70px w-50 border-radius-10 bg-white p-10"
        />
        <input
          type="text"
          placeholder="* Enter your email address"
          class="h-70px w-50 border-radius-10 bg-white p-10"
        />
      </div>
      <input
        type="text"
        placeholder="Enter your subject"
        class="h-70px border-radius-10 bg-white w-100vw mg-top-20 p-10"
      />
      <textarea
        name=""
        id=""
        class="h-100px border-radius-10 bg-white w-100vw mg-top-20 p-10"
        placeholder="* Your message here"
      >
      </textarea>

      <div class="d-flex justify-between">
        <button class="border-radius-5 bg-lightblue mg-top-20 p-10 color-white">
          Send message
        </button>
        <p>* Please fill all required form field, thanks!</p>
      </div>
    </form>
  </body>
</html>
