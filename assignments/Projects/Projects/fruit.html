<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài tập 2 - Tìm trái cây</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <h2 class="page-title">Bài 2: Tìm kiếm trái cây</h2>
    <div class="search-section">
      <label for="inputFruitName">Nhập tên trái cây:</label>
      <div class="search-row">
        <input type="text" id="inputFruitName" placeholder="apple, banana, orange...">
        <button class="btn-search" id="btnSearchFruit">Tìm kiếm</button>
      </div>
    </div>
    <div class="result-section">
      <p class="result-text" id="resultMessage">Chưa có kết quả hiển thị</p>
      <div class="result-image" id="resultImageContainer">
        <img src="images/no-image.jpg" alt="No Image">
      </div>
    </div>
  </div>
  <script src="js/fruit.js"></script>
</body>
</html>
