<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài tập 7 - Chỉnh sửa hồ sơ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <h2 class="page-title">Bài 7: Chỉnh sửa hồ sơ</h2>
    <div class="profile-card" id="profileCard">
      <div class="profile-field">
        <span class="field-label">Họ tên:</span>
        <span class="field-value" id="displayName">Nguyễn Văn A</span>
      </div>
      <div class="profile-field">
        <span class="field-label">Tuổi:</span>
        <span class="field-value" id="displayAge">20</span>
      </div>
      <div class="profile-field">
        <span class="field-label">Ngành học:</span>
        <span class="field-value" id="displayMajor">Công nghệ thông tin</span>
      </div>
    </div>
    <div class="edit-form" id="editForm" style="display: none;">
      <div class="form-group">
        <label for="editName">Họ tên:</label>
        <input type="text" id="editName">
      </div>
      <div class="form-group">
        <label for="editAge">Tuổi:</label>
        <input type="number" id="editAge">
      </div>
      <div class="form-group">
        <label for="editMajor">Ngành học:</label>
        <input type="text" id="editMajor">
      </div>
      <div class="form-actions">
        <button class="btn-save" id="btnSaveProfile">💾 Lưu</button>
        <button class="btn-cancel" id="btnCancelEdit">✕ Huỷ</button>
      </div>
    </div>
    <button class="btn-primary" id="btnEditProfile" style="margin-top: 16px;">✏️ Chỉnh sửa hồ sơ</button>
  </div>
  <script src="js/edit-profile.js"></script>
</body>
</html>
