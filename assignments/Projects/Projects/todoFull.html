<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài tập 4 - Danh sách công việc</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- //link bootstraps -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-wrapper">
      <h2 class="page-title">Bài 4: Danh sách công việc (Todo)</h2>
      <div class="todo-input-section">
        <div class="search-row">
          <input
            type="text"
            id="inputTaskName"
            placeholder="Nhập công việc..."
          />
          <button class="btn-search" id="btnAddTask">+ Thêm</button>
        </div>
      </div>
      <p class="todo-info" id="taskCountInfo">Tổng: 0 công việc</p>
      <ul class="todo-list" id="taskList">
        <!-- Các item sẽ được thêm bằng JS -->
      </ul>
    </div>
    <script src="js/todoFull.js"></script>
  </body>
</html>
