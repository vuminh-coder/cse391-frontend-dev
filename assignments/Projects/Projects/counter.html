<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài tập 3 - Bộ đếm</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <h2 class="page-title">Bài 3: Bộ đếm (Counter)</h2>
    <div class="counter-display">
      <span class="counter-value" id="counterValue">0</span>
    </div>
    <div class="counter-buttons">
      <button class="btn-counter btn-decrease" id="btnDecrease">− Giảm</button>
      <button class="btn-counter btn-reset" id="btnReset">↺ Reset</button>
      <button class="btn-counter btn-increase" id="btnIncrease">+ Tăng</button>
    </div>
  </div>
  <script src="js/counter.js"></script>
</body>
</html>
